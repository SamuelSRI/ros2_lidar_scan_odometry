lidar_scan_odometry_node:
  ros__parameters:
    scan_topic: /scan
    odom_topic: /lidar/odom

    odom_frame: odom
    base_frame: base_link

    min_range: 0.10
    max_range: 12.0
    max_scan_points: 500

    # ICP scan -> sous-carte locale
    icp_iterations: 20
    max_correspondence_distance: 0.40
    min_correspondences: 40
    min_inlier_ratio: 0.25
    max_icp_rmse: 0.20
    convergence_translation: 0.001
    convergence_rotation: 0.001

    # Création et taille de la sous-carte
    keyframe_translation: 0.20
    keyframe_rotation: 0.15
    max_keyframes: 15
    submap_voxel_size: 0.05
    max_submap_points: 2500

    # Rejet des sauts impossibles entre deux scans
    max_translation_per_scan: 0.35
    max_rotation_per_scan: 0.35

    use_constant_velocity_prediction: true

    xy_covariance: 0.03
    yaw_covariance: 0.03
    rejected_xy_covariance: 1.0
    rejected_yaw_covariance: 1.0
